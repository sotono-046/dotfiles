name: check

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  lint-and-test:
    name: lint and test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install test extras
        run: python3 -m pip install Pygments

      - name: Lint templates and check token sync
        run: python3 scripts/build.py --check

      - name: Run test suite
        run: python3 scripts/tests/test_build.py

      - name: Build and audit skill package
        run: bash scripts/package-skill.sh /tmp/kami-ci.zip

  verify-render:
    name: render and verify
    runs-on: ubuntu-latest
    needs: lint-and-test
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install WeasyPrint system libs and Japanese fallback fonts
        # libcairo2 / libpango / libharfbuzz are required by WeasyPrint at
        # runtime; fonts-noto-cjk provides Noto Sans CJK JP, the same gothic
        # face the templates bundle, so Japanese glyphs embed in CI even though
        # the macOS system fonts (Hiragino Sans / Yu Gothic) are absent. The
        # verify step accepts Noto as a recognized fallback (see
        # scripts/build.py fallback_present).
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libcairo2 libpango-1.0-0 libpangoft2-1.0-0 libharfbuzz0b \
            fonts-noto-cjk fonts-noto-cjk-extra

      - name: Install Python deps
        run: python3 -m pip install weasyprint pypdf Pygments

      - name: Verify strict page-count targets
        # Only the hard-invariant templates (resume-en == 2, one-pager-en == 1)
        # run in CI. The long-doc / portfolio / slides ceilings are soft and
        # rely on the stabilizer; the next step exercises that path.
        # KAMI_ALLOW_FALLBACK_ONLY=1: CI lacks the macOS system gothic fonts
        # (Helvetica / Hiragino / Yu Gothic). Treat fallback-only embedding as
        # a warning instead of a failure so CI can still gate page counts.
        env:
          KAMI_ALLOW_FALLBACK_ONLY: '1'
        run: |
          python3 scripts/build.py --verify one-pager-en
          python3 scripts/build.py --verify resume-en

      - name: Stabilize end-to-end (smoke)
        # Runs the solver across every stabilize_max > 0 target. Non-strict
        # because CI uses Noto Sans CJK JP while local preview may use Hiragino
        # Sans / Yu Gothic, and the different glyph widths can change page count
        # by +/- 1, which the solver should handle but should not gate CI on. A
        # solver crash still fails the build.
        run: python3 scripts/stabilize.py all --report
