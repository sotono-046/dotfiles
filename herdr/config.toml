# Herdr configuration
# Linked to ~/.config/herdr/config.toml by install.sh.

# Keep the tracked config read-only from Herdr's first-run setup.
onboarding = false

[theme]
name = "catppuccin"

[terminal]
default_shell = "/bin/zsh"
shell_mode = "auto"
new_cwd = "follow"

[keys]
# Match the existing tmux prefix and pane navigation.
prefix = "ctrl+a"
workspace_picker = ""
new_workspace = "prefix+n"
rename_workspace = ""
close_workspace = "prefix+shift+w"
next_tab = ""
focus_pane_left = "prefix+h"
focus_pane_down = "prefix+j"
focus_pane_up = "prefix+k"
focus_pane_right = "prefix+l"
split_vertical = "prefix+_"
split_horizontal = "prefix+minus"
close_pane = "prefix+w"
resize_mode = "prefix+r"
copy_mode = "prefix+["

[ui]
mouse_capture = true
copy_on_select = true
pane_borders = true
